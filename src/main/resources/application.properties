spring.application.name=university-management

# ---- PostgreSQL datasource (env-overridable for laptop/VPS parity) ----
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/university_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# ---- JPA / Hibernate ----
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ---- JWT (Lab 7) ----
# Base64-encoded 256-bit secret. Override in production via env var APP_JWT_SECRET.
app.jwt.secret=${APP_JWT_SECRET:c2VjcmV0LWtleS1mb3ItdW5pdmVyc2l0eS1tYW5hZ2VtZW50LWFwcC1jaGFuZ2UtbWU=}
app.jwt.expiration-ms=3600000

# ---- File upload (Lab 8) ----
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
app.upload.dir=uploads

# ---- Swagger / OpenAPI (Lab 10) ----
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

# ---- Seed an initial ADMIN user on startup (admin / admin123) ----
app.seed.admin.enabled=true
app.seed.admin.username=admin
app.seed.admin.password=admin123

# ---- Seed demo data (teachers/courses/student) — only on an EMPTY database ----
app.seed.demo.enabled=true
