# Test profile — uses in-memory H2 so unit/integration tests need no real DB.
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

app.jwt.secret=dGVzdC1zZWNyZXQta2V5LWZvci11bml0LXRlc3RzLXBsZWFzZS1jaGFuZ2UtbWU=
app.jwt.expiration-ms=3600000
app.upload.dir=build/test-uploads
app.seed.admin.enabled=false
